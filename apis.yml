position: Producing
description: >-
  A.P. Moller - Maersk is the Danish integrated container shipping and logistics company. Maersk operates one of the
  world's largest ocean fleets and a global network of warehouses, inland transport, customs services, and air-freight
  capacity through Maersk Air Cargo. The Maersk Developer Portal exposes a catalogue of APIs for Track and Trace, Ocean
  Booking (DCSA-aligned), Schedules, Product Offers and pricing, electronic Bills of Lading, Verified Gross Mass,
  Demurrage and Detention, Air Booking, VGM, and container Maintenance and Repair. Many of Maersk's APIs implement
  Digital Container Shipping Association (DCSA) interface standards so the same client can address multiple carriers.
