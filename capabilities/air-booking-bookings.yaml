naftiko: 1.0.0-alpha2
info:
  label: Maersk Air Booking API — Bookings
  description: >
    Create and retrieve air freight bookings via Maersk Air Cargo.
  tags:
    - Maersk
    - Air
    - Booking
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      MAERSK_CONSUMER_KEY: MAERSK_CONSUMER_KEY
capability:
  consumes:
    - type: http
      namespace: air-booking
      baseUri: https://api.maersk.com
      description: Maersk Air Cargo booking.
      resources:
        - name: bookings
          path: /air-booking/v1/bookings
          operations:
            - name: createAirBooking
              method: POST
              description: Submit an air freight booking request.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: booking
          path: /air-booking/v1/bookings/{bookingReference}
          operations:
            - name: getAirBooking
              method: GET
              description: Retrieve an air booking.
              inputParameters:
                - name: bookingReference
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apikey
        in: header
        name: Consumer-Key
        valueFrom: env.MAERSK_CONSUMER_KEY
